app = "kabinett-europeana-visual-demo"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile.europeana-demo"

[env]
  NODE_ENV = "production"
  DATABASE_PATH = "/app/apps/europeana-visual-service/data/europeana-demo.db"
  KABINETT_CLIP_ALLOW_REMOTE = "1"
  VISUAL_SERVICE_URL = "http://127.0.0.1:4318"
  EUROPEANA_VISUAL_RATE_LIMIT_MAX = "180"
  EUROPEANA_VISUAL_RATE_LIMIT_WINDOW_MS = "60000"

[http_service]
  internal_port = 4320
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.ui]
    type = "http"
    port = 4320
    method = "get"
    path = "/"
    interval = "30s"
    timeout = "10s"
    grace_period = "120s"

[[vm]]
  memory = "4gb"
  cpu_kind = "shared"
  cpus = 2
